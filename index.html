
<style>
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{background:#0a0a0a;border-radius:12px;padding:20px}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.pill{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .18s;background:#111;color:#7aa8c8;border-color:#1e3a52}
.pill.on{color:#fff}
.pill .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.section-label{font-size:11px;font-weight:600;color:#4a7a9b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.title-main{font-size:16px;font-weight:700;color:#85B7EB;margin-bottom:3px}
.title-sub{font-size:12px;color:#4a7a9b;margin-bottom:18px}
</style>

<h2 class="sr-only">Dashboard interattivo Viatris Italia indici ROE ROA r MT/E per anno 2021 2023 2024</h2>

<div style="padding:1rem 0">
  <div class="title-main">Viatris Italia — Indici di Bilancio</div>
  <div class="title-sub">MT/E moltiplicato ×100 per comparabilità</div>

  <div class="pill-row" id="pills"></div>

  <div class="wrap" style="margin-bottom:1.5rem">
    <div class="section-label">Confronto per anno</div>
    <div style="position:relative;width:100%;height:320px">
      <canvas id="barChart" role="img" aria-label="Istogramma Viatris Italia ROE ROA r MT/E per anno">Istogramma Viatris Italia.</canvas>
    </div>
  </div>

  <div class="wrap">
    <div class="section-label">Andamento nel tempo</div>
    <div style="position:relative;width:100%;height:240px">
      <canvas id="lineChart" role="img" aria-label="Grafico a linee andamento indici Viatris Italia">Andamento temporale.</canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const INDICI = [
  { key:'ROE', label:'ROE',  valori:[-2.77, 7.41, 6.19], colore:'#7F77DD' },
  { key:'ROA', label:'ROA',  valori:[ 1.42, 4.31, 2.87], colore:'#1D9E75' },
  { key:'r',   label:'r',    valori:[-2.19,-2.69,-0.47], colore:'#D85A30' },
  { key:'MTE', label:'MT/E', valori:[ 480,  391,  217],  colore:'#3fa8d8' },
];
const ANNI = ['2021','2023','2024'];
let active = new Set(INDICI.map(i=>i.key));
let bChart, lChart;

function hex2rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

const axisStyle={ticks:{color:'#7aa8c8',font:{size:11}},grid:{color:'rgba(255,255,255,0.06)'},border:{color:'rgba(255,255,255,0.1)'}};
const ttStyle={backgroundColor:'#0d1f30',titleColor:'#85B7EB',bodyColor:'#c8e4f4',borderColor:'#378ADD',borderWidth:0.5,padding:10};

function buildPills(){
  const row=document.getElementById('pills');
  row.innerHTML='';
  INDICI.forEach(({key,label,colore})=>{
    const on=active.has(key);
    const p=document.createElement('button');
    p.className='pill'+(on?' on':'');
    p.style.borderColor=on?colore:'#1e3a52';
    p.style.background=on?hex2rgba(colore,0.18):'#111';
    p.innerHTML=`<span class="dot" style="background:${on?colore:'#2a4a6b'}"></span>${label}`;
    p.onclick=()=>{
      if(active.has(key)){if(active.size<=1)return;active.delete(key);}
      else active.add(key);
      buildPills();buildBarChart();buildLineChart();
    };
    row.appendChild(p);
  });
}

function vis(){return INDICI.filter(i=>active.has(i.key));}

function buildBarChart(){
  const keys=vis();
  const datasets=keys.map(({label,valori,colore})=>({
    label,
    data:valori,
    backgroundColor:hex2rgba(colore,0.82),
    borderColor:colore,
    borderWidth:1,borderRadius:5,borderSkipped:false,
  }));
  if(bChart)bChart.destroy();
  bChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:ANNI,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:400,easing:'easeInOutQuart'},
      plugins:{
        legend:{display:false},
        tooltip:{...ttStyle,mode:'index',intersect:false,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(2)}%`}}
      },
      scales:{
        x:{...axisStyle,ticks:{...axisStyle.ticks,font:{size:13},color:'#90b8d8'}},
        y:{
          ...axisStyle,
          title:{display:true,text:'(%)',color:'#7aa8c8',font:{size:12}},
          ticks:{...axisStyle.ticks,callback:v=>v.toFixed(1)+'%'}
        }
      }
    }
  });
}

function buildLineChart(){
  const keys=vis();
  const datasets=keys.map(({label,valori,colore},i)=>({
    label,
    data:valori,
    borderColor:colore,
    pointBackgroundColor:colore,
    pointRadius:5,pointHoverRadius:8,
    tension:0.35,fill:false,borderWidth:2,
    borderDash:i%2===1?[5,3]:[],
  }));
  if(lChart)lChart.destroy();
  lChart=new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{labels:ANNI,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:400,easing:'easeInOutQuart'},
      plugins:{
        legend:{display:false},
        tooltip:{...ttStyle,mode:'index',intersect:false,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(2)}%`}}
      },
      scales:{
        x:{...axisStyle,ticks:{...axisStyle.ticks,font:{size:12}}},
        y:{
          ...axisStyle,
          title:{display:true,text:'(%)',color:'#7aa8c8',font:{size:12}},
          ticks:{...axisStyle.ticks,callback:v=>v.toFixed(1)+'%'}
        }
      }
    }
  });
}

buildPills();buildBarChart();buildLineChart();
</script>
